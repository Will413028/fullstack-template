pre-commit:
  parallel: true
  commands:
    prevent-env-leak:
      tags: security
      run: >-
        git diff --cached --name-only | grep -E '^(\.env)$' &&
        echo "⚠️ Error: You are trying to commit a .env file containing sensitive credentials. Git commit rejected." &&
        exit 1 || exit 0
    frontend-lint:
      root: frontend/
      glob: "*.{ts,tsx}"
      run: npx --no -- biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
      priority: 1
    frontend-types:
      root: frontend/
      glob: "*.{ts,tsx}"
      run: pnpm tsc --noEmit
      priority: 2
    backend-lint:
      root: backend/
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
      priority: 1
    backend-format:
      root: backend/
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true
      priority: 1
